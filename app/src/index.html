<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <meta http-equiv="Content-Security-Policy"
        content="default-src 'self'; style-src 'self' 'unsafe-inline'; script-src 'self' 'wasm-unsafe-eval'; img-src 'self' data: blob:; frame-src https:" />
  <link rel="stylesheet" href="../node_modules/@xterm/xterm/css/xterm.css" />
  <style>
    html, body { margin: 0; height: 100%; background: #1e1e2e; overflow: hidden; }
    body { display: flex; }
    #term { position: relative; flex: 1 1 auto; min-width: 0; padding: 6px; }
    /* hide xterm's own scrollbar (the thin bar on the terminal's right edge) */
    .xterm-viewport::-webkit-scrollbar { width: 0 !important; height: 0 !important; }
    .xterm-viewport { scrollbar-width: none !important; }
    #reels {
      flex: 0 0 40%; display: none; height: 100%;
      border-left: 1px solid #313244; background: #1e1e2e;
    }
    #reels.show { display: block; }
    #reels webview { width: 100%; height: 100%; border: 0; background: #1e1e2e; }
    #drop {
      position: absolute; inset: 0; display: none; align-items: center; justify-content: center;
      background: rgba(137,180,250,0.12); border: 2px dashed #89b4fa; z-index: 5;
      color: #89b4fa; font: 16px 'Cascadia Mono', Consolas, monospace; pointer-events: none;
    }
    #drop.show { display: flex; }
  </style>
</head>
<body>
  <div id="term"></div>
  <div id="reels">
    <webview id="reels-view" partition="persist:instagram" allowpopups
             useragent="Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/124.0.0.0 Safari/537.36"></webview>
  </div>
  <div id="drop">drop to paste files into the current session</div>
  <script src="../node_modules/@xterm/xterm/lib/xterm.js"></script>
  <script src="../node_modules/@xterm/addon-fit/lib/addon-fit.js"></script>
  <script src="../node_modules/@xterm/addon-image/lib/addon-image.js"></script>
  <script src="renderer.js"></script>
</body>
</html>
