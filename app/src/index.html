<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <meta http-equiv="Content-Security-Policy"
        content="default-src 'self'; style-src 'self' 'unsafe-inline'; script-src 'self'" />
  <link rel="stylesheet" href="../node_modules/@xterm/xterm/css/xterm.css" />
  <style>
    html, body { margin: 0; height: 100%; background: #1e1e2e; overflow: hidden; }
    #term { position: absolute; inset: 0; padding: 6px; }
    #drop {
      position: absolute; inset: 0; display: none; align-items: center; justify-content: center;
      background: rgba(137,180,250,0.12); border: 2px dashed #89b4fa; z-index: 5;
      color: #89b4fa; font: 16px 'Cascadia Mono', Consolas, monospace; pointer-events: none;
    }
    #drop.show { display: flex; }
  </style>
</head>
<body>
  <div id="term"></div>
  <div id="drop">drop to paste files into the current session</div>
  <script src="../node_modules/@xterm/xterm/lib/xterm.js"></script>
  <script src="../node_modules/@xterm/addon-fit/lib/addon-fit.js"></script>
  <script src="renderer.js"></script>
</body>
</html>
